name: CI

on:
  push:
    branches:
      - nacre-orchid-vertical-slice
      - main
      - "feat/**"
      - "release/**"
  pull_request:
    branches:
      - nacre-orchid-vertical-slice
      - main

jobs:
  ci:
    name: Lint · Type-check · Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      - name: Build
        run: npm run build
